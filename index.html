<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Study Workspace</title>
    <style>
        /* --- CSS VARIABLES & THEME --- */
        :root {
            --bg-dark: #090a0f;
            --grid-line: rgba(30, 41, 59, 0.3);
            --neon-cyan: #00f0ff;
            --neon-pink: #ff007f;
            --neon-purple: #9d00ff;
            --neon-lime: #39ff14;
            --panel-bg: rgba(15, 23, 42, 0.65);
            --panel-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #f1f5f9;
            overflow: hidden;
            position: relative;
        }

        /* --- BACKGROUND EFFECTS --- */
        .cyber-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(4, 5, 8, 0.95) 90%);
            z-index: 2;
            pointer-events: none;
        }

        /* --- FLOATING NEON ARTWORK --- */
        .ambient-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .neon-icon {
            position: absolute;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 10px currentColor);
            animation: float 9s ease-in-out infinite alternate;
        }

        .nc-cyan { color: var(--neon-cyan); stroke: var(--neon-cyan); stroke-width: 2.5; }
        .nc-pink { color: var(--neon-pink); stroke: var(--neon-pink); stroke-width: 2.5; }
        .nc-purple { color: var(--neon-purple); stroke: var(--neon-purple); stroke-width: 2.5; }
        .nc-lime { color: var(--neon-lime); stroke: var(--neon-lime); stroke-width: 2.5; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.4; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-30px) rotate(7deg); opacity: 0.5; }
        }

        /* Ambient Placement Layout */
        .pos-book    { top: 12%; left: 8%; width: 100px; animation-duration: 8s; }
        .pos-pencil  { top: 18%; right: 10%; width: 85px; animation-duration: 11s; animation-delay: -2s; }
        .pos-stack   { bottom: 15%; left: 10%; width: 90px; animation-duration: 10s; animation-delay: -4s; }
        .pos-cap     { bottom: 12%; right: 12%; width: 110px; animation-duration: 12s; animation-delay: -1s; }
        .pos-bulb    { top: 45%; left: 5%; width: 70px; animation-duration: 7s; animation-delay: -3s; }
        .pos-compass { top: 8%; left: 48%; width: 75px; animation-duration: 9s; animation-delay: -5s; }

        /* --- DASHBOARD INTERFACE LAYOUT --- */
        .dashboard-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            padding: 30px;
            display: grid;
            grid-template-columns: 320px 1fr 340px;
            grid-gap: 30px;
            align-items: center;
        }

        /* Glassmorphic Panel Styling */
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            height: 80vh;
            display: flex;
            flex-direction: column;
            transition: border-color 0.3s ease;
        }

        .panel-header {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- LEFT SIDEBAR: TASKS --- */
        #task-panel { border-top: 3px solid var(--neon-pink); }
        #task-panel .panel-header { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255, 0, 127, 0.4); }
        
        .task-input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"], textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--neon-pink);
            box-shadow: 0 0 8px rgba(255, 0, 127, 0.3);
        }

        .btn-add {
            background: transparent;
            border: 1px solid var(--neon-pink);
            border-radius: 8px;
            color: var(--neon-pink);
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: inset 0 0 4px rgba(255, 0, 127, 0.2);
        }

        .btn-add:hover {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .task-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        .task-list::-webkit-scrollbar { width: 5px; }
        .task-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.03);
            animation: fadeIn 0.3s ease;
        }

        .task-item.completed span {
            text-decoration: line-through;
            opacity: 0.4;
        }

        .task-item input[type="checkbox"] {
            margin-right: 10px;
            accent-color: var(--neon-pink);
            cursor: pointer;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.6;
        }
        .btn-delete:hover { opacity: 1; }

        /* --- CENTER: FOCUS CORE --- */
        .center-space {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .timer-display {
            font-size: 6.5rem;
            font-weight: 700;
            font-family: monospace;
            color: #ffffff;
            text-shadow: 
                0 0 10px #fff,
                0 0 20px var(--theme-color, var(--neon-cyan)),
                0 0 40px var(--theme-color, var(--neon-cyan));
            margin-bottom: 20px;
            letter-spacing: -2px;
            transition: text-shadow 0.5s ease;
        }

        .timer-label {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--neon-cyan);
            margin-bottom: 40px;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
        }

        .timer-controls {
            display: flex;
            gap: 20px;
        }

        .btn-control {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            border-radius: 30px;
            color: #fff;
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .btn-control:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 25px var(--neon-cyan);
            font-weight: 700;
        }

        /* --- RIGHT SIDEBAR: SCRATCHPAD --- */
        #notes-panel { border-top: 3px solid var(--neon-purple); }
        #notes-panel .panel-header { color: var(--neon-purple); text-shadow: 0 0 10px rgba(157, 0, 255, 0.4); }
        
        .scratchpad {
            width: 100%;
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.05);
            resize: none;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e2e8f0;
        }
        .scratchpad:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(157, 0, 255, 0.3);
        }

        /* --- GENERAL ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive constraints */
        @media(max-width: 1024px) {
            .dashboard-container {
                grid-template-columns: 1fr;
                overflow-y: auto;
                height: auto;
            }
            .panel { height: 400px; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>
    <div class="vignette"></div>

    <div class="ambient-layer">
        <svg class="neon-icon nc-cyan pos-book" viewBox="0 0 64 64">
            <path d="M32 52 c-6-8-18-8-26-4 V14 c8-4 20-4 26 4 c6-8 18-4 26-4 v34 C50 44 38 44 32 52 Z" />
            <path d="M32 18 v34" />
        </svg>

        <svg class="neon-icon nc-pink pos-pencil" viewBox="0 0 64 64">
            <path d="M10 45 L45 10 L54 19 L19 54 Z" />
            <path d="M12 52 L12 42 L42 12 L52 22 L22 52 Z" />
        </svg>

        <svg class="neon-icon nc-purple pos-stack" viewBox="0 0 64 64">
            <path d="M14 20 h36 v8 h-36 z" /><path d="M50 22 h6 v4 h-6" />
            <path d="M10 28 h40 v9 h-40 z" /><path d="M50 30 h8 v5 h-8" />
            <path d="M6 37 h48 v10 h-48 z" />
        </svg>

        <svg class="neon-icon nc-lime pos-cap" viewBox="0 0 64 64">
            <path d="M32 12 L58 24 L32 36 L6 24 Z" />
            <path d="M16 28 v14 c0 6 7 10 16 10 s16-4 16-10 V28" />
        </svg>

        <svg class="neon-icon nc-cyan pos-bulb" viewBox="0 0 64 64">
            <path d="M32 10 c-10 0-16 8-16 16 c0 7 4 11 7 14 l3 6 h12 l3-6 c3-3 7-7 7-14 c0-8-6-16-16-16 z" />
            <path d="M26 52 h12" />
        </svg>

        <svg class="neon-icon nc-pink pos-compass" viewBox="0 0 64 64">
            <path d="M32 10 v6" />
            <path d="M32 16 L18 54 M32 16 L46 54" />
            <path d="M23 40 h18" />
        </svg>
    </div>

    <div class="dashboard-container">
        
        <div class="panel" id="task-panel">
            <div class="panel-header">Task Matrix</div>
            <div class="task-input-wrapper">
                <input type="text" id="task-input" placeholder="Initialize execution load...">
                <button class="btn-add" id="btn-add-task">+</button>
            </div>
            <ul class="task-list" id="task-container">
                </ul>
        </div>

        <div class="center-space">
            <div class="timer-label" id="timer-state">Focus Period</div>
            <div class="timer-display" id="timer-string">25:00</div>
            <div class="timer-controls">
                <button class="btn-control" id="btn-trigger">Start</button>
                <button class="btn-control" id="btn-reset" style="border-color: rgba(255,255,255,0.2); box-shadow:none;">Reset</button>
            </div>
        </div>

        <div class="panel" id="notes-panel">
            <div class="panel-header">Scratchpad.log</div>
            <textarea class="scratchpad" placeholder="Dump raw thoughts, syntax notes, or transient memory logs here... Data auto-saves to your local browser partition."></textarea>
        </div>

    </div>

    <script>
        // --- POMODORO METRIC CONSOLE ---
        let timerInstance;
        let timeRemaining = 25 * 60; 
        let isRunning = false;

        const timerDisplay = document.getElementById('timer-string');
        const triggerBtn = document.getElementById('btn-trigger');
        const resetBtn = document.getElementById('btn-reset');
        const stateLabel = document.getElementById('timer-state');

        function updateDisplay() {
            const mins = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const secs = (timeRemaining % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${mins}:${secs}`;
        }

        function engineTick() {
            if (timeRemaining > 0) {
                timeRemaining--;
                updateDisplay();
            } else {
                clearInterval(timerInstance);
                isRunning = false;
                triggerBtn.textContent = 'Start';
                alert('Session complete! Take a step back and breathe.');
                timeRemaining = 25 * 60;
                updateDisplay();
            }
        }

        triggerBtn.addEventListener('click', () => {
            if (isRunning) {
                clearInterval(timerInstance);
                triggerBtn.textContent = 'Start';
            } else {
                timerInstance = setInterval(engineTick, 1000);
                triggerBtn.textContent = 'Pause';
            }
            isRunning = !isRunning;
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerInstance);
            isRunning = false;
            timeRemaining = 25 * 60;
            triggerBtn.textContent = 'Start';
            updateDisplay();
        });

        // --- TASK CORE PROCESSOR ---
        const taskInput = document.getElementById('task-input');
        const taskBtn = document.getElementById('btn-add-task');
        const taskContainer = document.getElementById('task-container');

        function appendTask(text) {
            const li = document.createElement('li');
            li.className = 'task-item';
            
            const leftDiv = document.createElement('div');
            leftDiv.style.display = 'flex';
            leftDiv.style.alignItems = 'center';

            const check = document.createElement('input');
            check.type = 'checkbox';
            check.addEventListener('change', () => {
                li.classList.toggle('completed', check.checked);
            });

            const span = document.createElement('span');
            span.textContent = text;

            leftDiv.appendChild(check);
            leftDiv.appendChild(span);

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-delete';
            deleteBtn.innerHTML = '&#x2715;';
            deleteBtn.addEventListener('click', () => li.remove());

            li.appendChild(leftDiv);
            li.appendChild(deleteBtn);
            taskContainer.appendChild(li);
        }

        taskBtn.addEventListener('click', () => {
            if(taskInput.value.trim() !== "") {
                appendTask(taskInput.value.trim());
                taskInput.value = "";
            }
        });

        taskInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && taskInput.value.trim() !== "") {
                appendTask(taskInput.value.trim());
                taskInput.value = "";
            }
        });

        // --- SCRATCHPAD STORAGE ENGINE ---
        const scratchpad = document.querySelector('.scratchpad');
        
        // Initialization configuration
        if(localStorage.getItem('neonWorkspaceNotes')) {
            scratchpad.value = localStorage.getItem('neonWorkspaceNotes');
        }

        scratchpad.addEventListener('input', () => {
            localStorage.setItem('neonWorkspaceNotes', scratchpad.value);
        });

        // Seed data defaults for display immersion
        appendTask("Review active technical modules");
        appendTask("Debug thread safety loops");
    </script>
</body>
</html>
